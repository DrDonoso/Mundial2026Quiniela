# ============================================================
# Mundial2026Quiniela — Build Compose
# Usage: docker compose -f docker-compose.build.yml build
# ============================================================

services:
  # ── Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mundial-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mundial}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mundial2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mundial} -d ${POSTGRES_DB:-mundial2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mundial-net
    restart: unless-stopped

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: drdonoso/mundial-backend:latest
    container_name: mundial-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - mundial-net
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: drdonoso/mundial-frontend:latest
    container_name: mundial-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - mundial-net
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

networks:
  mundial-net:
    driver: bridge
