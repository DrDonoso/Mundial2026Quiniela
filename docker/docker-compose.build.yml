# ============================================================
# Mundial2026Over9000 — Development / Build Compose
# Usage: docker compose -f docker/docker-compose.build.yml up --build
# ============================================================

services:
  # ── Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mundial-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mundial}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mundial2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mundial} -d ${POSTGRES_DB:-mundial2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mundial-net
    restart: unless-stopped

  # ── Backend (dev mode with hot-reload) ────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mundial-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - mundial-net
    restart: unless-stopped

  # ── Frontend (Vite dev server, NOT nginx) ─────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: build
    container_name: mundial-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/build
      - /build/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - mundial-net
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

networks:
  mundial-net:
    driver: bridge
