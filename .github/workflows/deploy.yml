# ============================================================
# Mundial2026Quiniela — Deploy Pipeline
# Runs on: push of version tags (v*)
# Builds and pushes Docker images to DockerHub
# ============================================================

name: Deploy

on:
  push:
    tags:
      - "v*"

env:
  DOCKERHUB_FRONTEND: drdonoso/mundial-frontend
  DOCKERHUB_BACKEND: drdonoso/mundial-backend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: meta
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_BACKEND }}:latest
            ${{ env.DOCKERHUB_BACKEND }}:${{ steps.meta.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_FRONTEND }}:latest
            ${{ env.DOCKERHUB_FRONTEND }}:${{ steps.meta.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.VERSION }}
          name: Release ${{ steps.meta.outputs.VERSION }}
          generate_release_notes: true
